# Agent X (Auto) - Adaptive Issue Router
# Uses GitHub Projects V2 status as the primary routing signal on manual dispatch and explicit reroute comments when configured.
# Falls back to label classification when project status is unavailable, including issue-open events.

name: Agent X (Auto)

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

# Prevent duplicate runs for the same issue
concurrency:
  group: agent-x-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: write
  repository-projects: read

jobs:
  route:
    name: Route Issue to Agent
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.route.outputs.agent }}
      issue_number: ${{ steps.route.outputs.issue_number }}
    steps:
      - name: Determine Agent
        id: route
        uses: actions/github-script@v7
        with:
          script: |
            const rerouteCommand = '/agentx route';
            const isIssueComment = context.eventName === 'issue_comment';

            if (isIssueComment && context.payload.issue?.pull_request) {
              console.log('[SKIP] Ignoring pull request comment event');
              core.setOutput('agent', '');
              core.setOutput('issue_number', '');
              return;
            }

            if (isIssueComment) {
              const commentBody = (context.payload.comment?.body || '').trim();
              if (commentBody !== rerouteCommand) {
                console.log(`[SKIP] Comment did not request reroute: expected "${rerouteCommand}"`);
                core.setOutput('agent', '');
                core.setOutput('issue_number', '');
                return;
              }

              console.log(`[INFO] Explicit reroute requested via issue comment command ${rerouteCommand}`);
            }

            // Get issue number
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? parseInt(context.payload.inputs.issue_number)
              : context.payload.issue?.number;

            if (!issueNumber) {
              console.log('[FAIL] No issue to process');
              return;
            }

            // Get issue details
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Issue #${issueNumber}: ${labels.join(', ')}`);

            const loadAgentXConfig = async () => {
              try {
                const response = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: '.agentx/config.json'
                });

                if (!('content' in response.data) || !response.data.content) {
                  return {};
                }

                const raw = Buffer.from(response.data.content, response.data.encoding || 'base64').toString('utf8');
                return JSON.parse(raw);
              } catch (error) {
                console.log(`[INFO] Unable to load .agentx/config.json: ${error.message}`);
                return {};
              }
            };

            const fileExists = async (path) => {
              try {
                await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path,
                });
                return true;
              } catch (error) {
                return false;
              }
            };

            const normalizeStatus = (value) => (value || '').trim().toLowerCase();

            const readProjectStatus = async (config) => {
              const projectNumber = Number(config.project || 0);
              const projectOwner = config.projectOwner || context.repo.owner;

              if (projectNumber <= 0) {
                return { status: '', source: 'labels' };
              }

              try {
                const result = await github.graphql(
                  `query($issueId: ID!) {
                    node(id: $issueId) {
                      ... on Issue {
                        projectItems(first: 20) {
                          nodes {
                            project {
                              ... on ProjectV2 {
                                number
                                owner {
                                  __typename
                                  ... on User { login }
                                  ... on Organization { login }
                                }
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }`,
                  { issueId: issue.node_id }
                );

                const items = result.node?.projectItems?.nodes || [];
                for (const item of items) {
                  const project = item.project;
                  if (!project || project.number !== projectNumber) {
                    continue;
                  }

                  const ownerLogin = project.owner?.login || '';
                  if (projectOwner && ownerLogin && ownerLogin !== projectOwner) {
                    continue;
                  }

                  const statusField = (item.fieldValues?.nodes || []).find((entry) => entry.field?.name === 'Status' && entry.name);
                  if (statusField?.name) {
                    return { status: statusField.name, source: 'project' };
                  }
                }
              } catch (error) {
                console.log(`[INFO] Project status lookup failed: ${error.message}`);
              }

              return { status: '', source: 'labels' };
            };

            // --- Domain Classification (AI-First Intent Preservation) ---
            const aiKeywords = /\b(AI|LLM|ML|machine learning|deep learning|GPT|model inference|NLP|neural|agent framework|foundry|openai|anthropic|gemini|intelligent|smart analysis|automated reasoning|natural language|embedding|rag|fine.?tun|prompt engineering)\b/i;
            const textToScan = `${issue.title} ${issue.body || ''}`;

            if (aiKeywords.test(textToScan) && !labels.includes('needs:ai')) {
              console.log(' AI/ML domain detected - adding needs:ai label');
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs:ai']
              });
              labels.push('needs:ai');
            }

            const config = await loadAgentXConfig();
            const { status: projectStatus, source: statusSource } = await readProjectStatus(config);
            const normalizedStatus = normalizeStatus(projectStatus);
            const hasArchitecture = (await fileExists(`docs/artifacts/adr/ADR-${issueNumber}.md`))
              && (await fileExists(`docs/artifacts/specs/SPEC-${issueNumber}.md`));

            if (projectStatus) {
              console.log(`[INFO] Project status for #${issueNumber}: ${projectStatus}`);
            } else {
              console.log('[INFO] No project status resolved; falling back to label classification');
            }

            // --- Routing ---
            let agent = null;

            if (normalizedStatus === 'in review') {
              agent = 'reviewer';
            } else if (normalizedStatus === 'ready') {
              if (labels.includes('needs:ux')) {
                agent = 'ux';
              } else if (labels.includes('type:devops')) {
                agent = 'devops';
              } else if (labels.includes('type:data-science')) {
                agent = 'data-scientist';
              } else if (labels.includes('type:testing') || labels.includes('needs:testing')) {
                agent = 'tester';
              } else if (hasArchitecture) {
                agent = 'engineer';
              } else if (labels.includes('type:feature') || labels.includes('type:spike') || labels.includes('type:story')) {
                agent = 'architect';
              }
            } else if (normalizedStatus === 'in progress') {
              if (labels.includes('type:devops')) {
                agent = 'devops';
              } else if (labels.includes('type:data-science')) {
                agent = 'data-scientist';
              } else if (labels.includes('type:testing') || labels.includes('needs:testing')) {
                agent = 'tester';
              } else {
                agent = 'engineer';
              }
            } else if (normalizedStatus === 'validating') {
              if (labels.includes('type:devops')) {
                agent = 'devops';
              } else if (labels.includes('type:testing') || labels.includes('needs:testing')) {
                agent = 'tester';
              }
            }

            if (!agent && labels.includes('type:epic')) {
              agent = 'pm';
            } else if (!agent && labels.includes('type:bug')) {
              agent = 'engineer'; // Bugs skip PM/Architect
            } else if (!agent && labels.includes('needs:ux')) {
              agent = 'ux';
            } else if (!agent && labels.includes('type:devops')) {
              agent = 'devops';
            } else if (!agent && labels.includes('type:data-science')) {
              agent = 'data-scientist';
            } else if (!agent && (labels.includes('type:testing') || labels.includes('needs:testing'))) {
              agent = 'tester';
            } else if (!agent && (labels.includes('type:feature') || labels.includes('type:spike'))) {
              agent = 'architect';
            } else if (!agent && (labels.includes('type:story') || labels.includes('type:docs'))) {
              agent = 'engineer';
            } else if (!agent && labels.includes('needs:review')) {
              agent = 'reviewer';
            }

            core.setOutput('agent', agent || '');
            core.setOutput('issue_number', issueNumber);
            console.log(agent ? `[PASS] Routing to: ${agent}` : '[PAUSE] No routing needed');
            console.log(`[INFO] Routing source: ${statusSource}`);

  pm:
    name: Product Manager
    needs: route
    if: needs.route.outputs.agent == 'pm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PRD Scaffold
        run: |
          mkdir -p docs/artifacts/prd
          ISSUE="${{ needs.route.outputs.issue_number }}"
          if [ ! -f "docs/artifacts/prd/PRD-${ISSUE}.md" ]; then
            cp .github/templates/PRD-TEMPLATE.md "docs/artifacts/prd/PRD-${ISSUE}.md"
            sed -i "s/{epic-id}/${ISSUE}/g" "docs/artifacts/prd/PRD-${ISSUE}.md"
            echo "[PASS] Created PRD scaffold"
          else
            echo "[SKIP] PRD already exists"
          fi

      - name: Validate Handoff (Optional)
        continue-on-error: true
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          if [ -f ".github/scripts/validate-handoff.sh" ]; then
            echo "[INFO] Running pre-handoff validation..."
            bash .github/scripts/validate-handoff.sh "${ISSUE}" pm || echo "[WARN] Validation incomplete (scaffold stage)"
          fi

      - name: Commit & Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/artifacts/prd/
          git diff --cached --quiet || git commit -m "docs: scaffold PRD for Epic #${ISSUE}"
          git push || true
          gh issue comment ${ISSUE} --body "**PM Agent**: PRD scaffold created at docs/artifacts/prd/PRD-${ISSUE}.md - Update status to Ready in Projects board when complete."

  ux:
    name: UX Designer
    needs: route
    if: needs.route.outputs.agent == 'ux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create UX Scaffold
        run: |
          mkdir -p docs/ux docs/artifacts
          ISSUE="${{ needs.route.outputs.issue_number }}"
          if [ ! -f "docs/ux/UX-${ISSUE}.md" ]; then
            cp .github/templates/UX-TEMPLATE.md "docs/ux/UX-${ISSUE}.md"
            sed -i "s/{feature-id}/${ISSUE}/g" "docs/ux/UX-${ISSUE}.md"
            echo "[PASS] Created UX scaffold"
          else
            echo "[SKIP] UX design already exists"
          fi

      - name: Commit & Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ux/
          git diff --cached --quiet || git commit -m "docs: scaffold UX design for #${ISSUE}"
          git push || true
          gh issue comment ${ISSUE} --body "**UX Agent**: Design scaffold created at docs/ux/UX-${ISSUE}.md - Update status to Ready in Projects board when complete."

  architect:
    name: Architect
    needs: route
    if: needs.route.outputs.agent == 'architect'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create ADR + Spec Scaffold
        run: |
          mkdir -p docs/artifacts/adr docs/artifacts/specs
          ISSUE="${{ needs.route.outputs.issue_number }}"

          if [ ! -f "docs/artifacts/adr/ADR-${ISSUE}.md" ]; then
            cp .github/templates/ADR-TEMPLATE.md "docs/artifacts/adr/ADR-${ISSUE}.md"
            sed -i "s/{epic-id}/${ISSUE}/g" "docs/artifacts/adr/ADR-${ISSUE}.md"
          fi

          if [ ! -f "docs/artifacts/specs/SPEC-${ISSUE}.md" ]; then
            cp .github/templates/SPEC-TEMPLATE.md "docs/artifacts/specs/SPEC-${ISSUE}.md"
            sed -i "s/{feature-id}/${ISSUE}/g" "docs/artifacts/specs/SPEC-${ISSUE}.md"
          fi

      - name: Commit & Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/artifacts/adr/ docs/artifacts/specs/
          git diff --cached --quiet || git commit -m "docs: scaffold ADR + Spec for #${ISSUE}"
          git push || true
          gh issue comment ${ISSUE} --body "**Architect Agent**: Scaffolds created (ADR: docs/artifacts/adr/ADR-${ISSUE}.md, Spec: docs/artifacts/specs/SPEC-${ISSUE}.md) - Update status to Ready in Projects board when complete."

  engineer:
    name: Engineer
    needs: route
    if: needs.route.outputs.agent == 'engineer'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge Assignment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          gh issue comment ${ISSUE} --repo ${{ github.repository }} --body "**Engineer Agent**: Ready for implementation. Move status to In Progress, implement with tests (80%+ coverage), then move to In Review when done."

  reviewer:
    name: Reviewer
    needs: route
    if: needs.route.outputs.agent == 'reviewer'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Review Scaffold
        run: |
          mkdir -p docs/artifacts/reviews
          ISSUE="${{ needs.route.outputs.issue_number }}"
          if [ ! -f "docs/artifacts/reviews/REVIEW-${ISSUE}.md" ]; then
            cp .github/templates/REVIEW-TEMPLATE.md "docs/artifacts/reviews/REVIEW-${ISSUE}.md"
            sed -i "s/{issue-id}/${ISSUE}/g" "docs/artifacts/reviews/REVIEW-${ISSUE}.md"
            echo "[PASS] Created Review scaffold"
          else
            echo "[SKIP] Review document already exists"
          fi

      - name: Commit & Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/artifacts/reviews/
          git diff --cached --quiet || git commit -m "docs: scaffold review for #${ISSUE}"
          git push || true
          gh issue comment ${ISSUE} --body "**Reviewer Agent**: Review scaffold created at docs/artifacts/reviews/REVIEW-${ISSUE}.md - Complete review and move status to Done when approved."

  devops:
    name: DevOps Engineer
    needs: route
    if: needs.route.outputs.agent == 'devops'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Deployment Scaffold
        run: |
          mkdir -p docs/deployment
          ISSUE="${{ needs.route.outputs.issue_number }}"
          if [ ! -f "docs/deployment/DEPLOY-${ISSUE}.md" ]; then
            cat > "docs/deployment/DEPLOY-${ISSUE}.md" <<'DEPLOY_EOF'
          # Deployment Plan - Issue #ISSUE_PLACEHOLDER

          ## Pipeline Configuration
          <!-- Describe CI/CD pipeline changes -->

          ## Environment Changes
          <!-- Describe environment/infrastructure changes -->

          ## Rollback Plan
          <!-- Describe rollback procedure -->

          ## Security Checklist
          - [ ] No hardcoded secrets
          - [ ] Secrets use GitHub Secrets
          - [ ] Minimal permissions applied
          DEPLOY_EOF
            sed -i 's/^          //' "docs/deployment/DEPLOY-${ISSUE}.md"
            sed -i "s/ISSUE_PLACEHOLDER/${ISSUE}/g" "docs/deployment/DEPLOY-${ISSUE}.md"
            echo "[PASS] Created deployment scaffold"
          else
            echo "[SKIP] Deployment doc already exists"
          fi

      - name: Commit & Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/deployment/
          git diff --cached --quiet || git commit -m "docs: scaffold deployment plan for #${ISSUE}"
          git push || true
          gh issue comment ${ISSUE} --body "**DevOps Agent**: Deployment scaffold created at docs/deployment/DEPLOY-${ISSUE}.md - Implement pipeline and move to In Review when ready."

  data-scientist:
    name: Data Scientist
    needs: route
    if: needs.route.outputs.agent == 'data-scientist'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Data Science Scaffold
        run: |
          mkdir -p docs/data-science
          ISSUE="${{ needs.route.outputs.issue_number }}"
          FILE="docs/data-science/DS-${ISSUE}.md"
          if [ ! -f "$FILE" ]; then
            cat > "$FILE" <<'DS_EOF'
          # Data Science Plan - Issue #ISSUE_PLACEHOLDER

          ## Problem Framing
          <!-- Define target outcome and constraints -->

          ## Data and Evaluation Plan
          <!-- Datasets, metrics, baseline, acceptance thresholds -->

          ## Model and Prompt Strategy
          <!-- Model choices, prompt strategy, fallback behavior -->
          DS_EOF
            sed -i 's/^          //' "$FILE"
            sed -i "s/ISSUE_PLACEHOLDER/${ISSUE}/g" "$FILE"
            echo "[PASS] Created data science scaffold"
          else
            echo "[SKIP] Data science doc already exists"
          fi

      - name: Commit & Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data-science/
          git diff --cached --quiet || git commit -m "docs: scaffold data science plan for #${ISSUE}"
          git push || true
          gh issue comment ${ISSUE} --body "**Data Scientist Agent**: Data science scaffold created at docs/data-science/DS-${ISSUE}.md - Define evaluation and model strategy before implementation."

  tester:
    name: Tester
    needs: route
    if: needs.route.outputs.agent == 'tester'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge Assignment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.route.outputs.issue_number }}"
          gh issue comment ${ISSUE} --repo ${{ github.repository }} --body "**Tester Agent**: Ready to validate test coverage, regression safety, and certification criteria."
