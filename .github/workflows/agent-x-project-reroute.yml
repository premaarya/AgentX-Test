name: Agent X Project Reroute Poller

on:
  schedule:
    - cron: '7,27,47 * * * *'
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: 'How many minutes of recent Project V2 item changes to scan'
        required: false
        default: '25'
        type: string

concurrency:
  group: agent-x-project-reroute
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  repository-projects: read

jobs:
  reroute:
    name: Scan Project And Redispatch Agent X
    runs-on: ubuntu-latest
    env:
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '25' }}
    steps:
      - name: Redispatch Recently Changed Project Items
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoNameWithOwner = `${owner}/${repo}`;
            const lookbackMinutes = Number(process.env.LOOKBACK_MINUTES || '25');
            const cutoff = new Date(Date.now() - lookbackMinutes * 60 * 1000);
            const eligibleStatuses = new Set(['ready', 'in progress', 'in review', 'validating']);

            const normalizeStatus = (value) => (value || '').trim().toLowerCase();

            const loadAgentXConfig = async () => {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: '.agentx/config.json',
                });

                if (!('content' in response.data) || !response.data.content) {
                  return {};
                }

                const raw = Buffer.from(response.data.content, response.data.encoding || 'base64').toString('utf8');
                return JSON.parse(raw);
              } catch (error) {
                console.log(`[INFO] Unable to load .agentx/config.json: ${error.message}`);
                return {};
              }
            };

            const readProjectItems = async (projectOwner, projectNumber) => {
              const items = [];
              let cursor = null;

              while (true) {
                const result = await github.graphql(
                  `query($owner: String!, $number: Int!, $cursor: String) {
                    user: user(login: $owner) {
                      projectV2(number: $number) {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            updatedAt
                            content {
                              __typename
                              ... on Issue {
                                number
                                state
                                repository { nameWithOwner }
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                    org: organization(login: $owner) {
                      projectV2(number: $number) {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            updatedAt
                            content {
                              __typename
                              ... on Issue {
                                number
                                state
                                repository { nameWithOwner }
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }`,
                  {
                    owner: projectOwner,
                    number: projectNumber,
                    cursor,
                  },
                );

                const project = result.user?.projectV2 || result.org?.projectV2;
                if (!project) {
                  return items;
                }

                const page = project.items;
                items.push(...(page?.nodes || []));

                if (!page?.pageInfo?.hasNextPage) {
                  return items;
                }

                cursor = page.pageInfo.endCursor;
              }
            };

            const config = await loadAgentXConfig();
            const projectNumber = Number(config.project || 0);
            const projectOwner = config.projectOwner || owner;
            const defaultBranch = context.payload.repository?.default_branch || 'main';

            if (projectNumber <= 0) {
              console.log('[SKIP] No GitHub project configured in .agentx/config.json');
              return;
            }

            const items = await readProjectItems(projectOwner, projectNumber);
            if (!items.length) {
              console.log('[SKIP] No project items found to scan');
              return;
            }

            const candidates = new Map();

            for (const item of items) {
              const issue = item.content;
              if (!issue || issue.__typename !== 'Issue') {
                continue;
              }

              if (issue.repository?.nameWithOwner !== repoNameWithOwner || issue.state !== 'OPEN') {
                continue;
              }

              const updatedAt = new Date(item.updatedAt || 0);
              if (Number.isNaN(updatedAt.valueOf()) || updatedAt < cutoff) {
                continue;
              }

              const statusEntry = (item.fieldValues?.nodes || []).find((entry) => entry.field?.name === 'Status' && entry.name);
              const normalizedStatus = normalizeStatus(statusEntry?.name || '');
              if (!eligibleStatuses.has(normalizedStatus)) {
                continue;
              }

              const current = candidates.get(issue.number);
              if (!current || updatedAt > current.updatedAt) {
                candidates.set(issue.number, {
                  issueNumber: issue.number,
                  projectStatus: statusEntry.name,
                  updatedAt,
                });
              }
            }

            if (candidates.size === 0) {
              console.log(`[SKIP] No project items changed in the last ${lookbackMinutes} minutes for eligible statuses`);
              return;
            }

            const orderedCandidates = Array.from(candidates.values()).sort((left, right) => left.issueNumber - right.issueNumber);
            console.log(`[INFO] Redispatching ${orderedCandidates.length} issue(s): ${orderedCandidates.map((entry) => `#${entry.issueNumber}`).join(', ')}`);

            for (const candidate of orderedCandidates) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'agent-x.yml',
                ref: defaultBranch,
                inputs: {
                  issue_number: String(candidate.issueNumber),
                },
              });

              console.log(`[PASS] Redispatched Agent X for #${candidate.issueNumber} (${candidate.projectStatus}, updated ${candidate.updatedAt.toISOString()})`);
            }