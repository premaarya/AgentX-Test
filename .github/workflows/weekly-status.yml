name: Weekly Status Report
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect Metrics
        id: metrics
        run: |
          # Count files
          AGENTS=$(find .github/agents -name '*.agent.md' | wc -l)
          SKILLS=$(find .github/skills -name 'SKILL.md' | wc -l)
          INSTRUCTIONS=$(find .github/instructions -name '*.instructions.md' | wc -l)
          TEMPLATES=$(find .github/templates -name '*-TEMPLATE.md' | wc -l)
          PROMPTS=$(find .github/prompts -name '*.prompt.md' 2>/dev/null | wc -l)
          WORKFLOWS=$(find .github/workflows -name '*.yml' | wc -l)

          echo "agents=$AGENTS" >> "$GITHUB_OUTPUT"
          echo "skills=$SKILLS" >> "$GITHUB_OUTPUT"
          echo "instructions=$INSTRUCTIONS" >> "$GITHUB_OUTPUT"
          echo "templates=$TEMPLATES" >> "$GITHUB_OUTPUT"
          echo "prompts=$PROMPTS" >> "$GITHUB_OUTPUT"
          echo "workflows=$WORKFLOWS" >> "$GITHUB_OUTPUT"

      - name: Token Budget Check
        id: tokens
        run: |
          VIOLATIONS=0
          while IFS= read -r f; do
            CHARS=$(wc -c < "$f")
            TOKENS=$((CHARS / 4))
            if [ "$TOKENS" -gt 5000 ]; then
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find .github/skills -name 'SKILL.md')
          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"

      - name: Broken Links Check
        id: links
        run: |
          BROKEN=0
          for f in AGENTS.md Skills.md docs/WORKFLOW.md; do
            if [ -f "$f" ]; then
              while IFS= read -r link; do
                TARGET=$(echo "$link" | grep -oP '(?<=\]\()[^)]+' | head -1)
                if [ -n "$TARGET" ] && ! echo "$TARGET" | grep -qE '^https?://|^#|^mailto:'; then
                  DIR=$(dirname "$f")
                  RESOLVED="$DIR/$TARGET"
                  RESOLVED=$(echo "$RESOLVED" | sed 's/#.*//')
                  if [ ! -e "$RESOLVED" ]; then
                    BROKEN=$((BROKEN + 1))
                  fi
                fi
              done < <(grep -oP '\[[^\]]+\]\([^)]+\)' "$f" 2>/dev/null || true)
            fi
          done
          echo "broken=$BROKEN" >> "$GITHUB_OUTPUT"

      - name: Harness Plan Health
        id: harness
        run: |
          PLANS=0
          GAPS=0
          PLACEHOLDERS=0
          PROGRESS_LOGS=0

          if [ -d "docs/progress" ]; then
            PROGRESS_LOGS=$(find docs/progress -name '*.md' | wc -l)
          fi

          if [ -d "docs/plans" ]; then
            while IFS= read -r plan; do
              [ -z "$plan" ] && continue
              PLANS=$((PLANS + 1))

              for section in \
                "## Purpose / Big Picture" \
                "## Progress" \
                "## Decision Log" \
                "## Plan of Work" \
                "## Validation and Acceptance" \
                "## Artifacts and Notes"; do
                if ! grep -Fq "$section" "$plan"; then
                  GAPS=$((GAPS + 1))
                fi
              done

              if grep -Eq '^Observation:\s*$|^Evidence:\s*$|^Decision:\s*$|^Date/Author:\s*$|^\- \[ \] Acceptance evidence recorded$' "$plan"; then
                PLACEHOLDERS=$((PLACEHOLDERS + 1))
              fi
            done < <(find docs/plans -name '*.md' | sort)
          fi

          echo "plans=$PLANS" >> "$GITHUB_OUTPUT"
          echo "gaps=$GAPS" >> "$GITHUB_OUTPUT"
          echo "placeholders=$PLACEHOLDERS" >> "$GITHUB_OUTPUT"
          echo "progress_logs=$PROGRESS_LOGS" >> "$GITHUB_OUTPUT"

      - name: Generate Report
        run: |
          echo "# Weekly Status Report - $(date +%Y-%m-%d)" > /tmp/status.md
          echo "" >> /tmp/status.md
          echo "## Component Counts" >> /tmp/status.md
          echo "" >> /tmp/status.md
          echo "| Component | Count |" >> /tmp/status.md
          echo "|-----------|-------|" >> /tmp/status.md
          echo "| Agents | ${{ steps.metrics.outputs.agents }} |" >> /tmp/status.md
          echo "| Skills | ${{ steps.metrics.outputs.skills }} |" >> /tmp/status.md
          echo "| Instructions | ${{ steps.metrics.outputs.instructions }} |" >> /tmp/status.md
          echo "| Templates | ${{ steps.metrics.outputs.templates }} |" >> /tmp/status.md
          echo "| Prompts | ${{ steps.metrics.outputs.prompts }} |" >> /tmp/status.md
          echo "| Workflows | ${{ steps.metrics.outputs.workflows }} |" >> /tmp/status.md
          echo "| Execution Plans | ${{ steps.harness.outputs.plans }} |" >> /tmp/status.md
          echo "| Progress Logs | ${{ steps.harness.outputs.progress_logs }} |" >> /tmp/status.md
          echo "" >> /tmp/status.md
          echo "## Health Checks" >> /tmp/status.md
          echo "" >> /tmp/status.md
          echo "| Check | Status |" >> /tmp/status.md
          echo "|-------|--------|" >> /tmp/status.md

          if [ "${{ steps.tokens.outputs.violations }}" -eq 0 ]; then
            echo "| Token Budget | [PASS] All within limits |" >> /tmp/status.md
          else
            echo "| Token Budget | [FAIL] ${{ steps.tokens.outputs.violations }} violation(s) |" >> /tmp/status.md
          fi

          if [ "${{ steps.links.outputs.broken }}" -eq 0 ]; then
            echo "| Reference Links | [PASS] All valid |" >> /tmp/status.md
          else
            echo "| Reference Links | [FAIL] ${{ steps.links.outputs.broken }} broken link(s) |" >> /tmp/status.md
          fi

          if [ "${{ steps.harness.outputs.gaps }}" -eq 0 ]; then
            echo "| Plan Structure | [PASS] Required sections present |" >> /tmp/status.md
          else
            echo "| Plan Structure | [FAIL] ${{ steps.harness.outputs.gaps }} missing required section(s) |" >> /tmp/status.md
          fi

          if [ "${{ steps.harness.outputs.placeholders }}" -eq 0 ]; then
            echo "| Plan Placeholder Debt | [PASS] No obvious stale placeholders |" >> /tmp/status.md
          else
            echo "| Plan Placeholder Debt | [WARN] ${{ steps.harness.outputs.placeholders }} plan(s) still contain placeholder content |" >> /tmp/status.md
          fi

          echo "" >> /tmp/status.md
          echo "---" >> /tmp/status.md
          echo "Generated by weekly-status workflow." >> /tmp/status.md

          cat /tmp/status.md
