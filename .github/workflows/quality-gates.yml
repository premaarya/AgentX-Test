name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to validate'
        required: true
        type: string

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  quality-checks:
    name: Enforce Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Environment
        run: |
          echo "ISSUE_NUMBER=${{ github.event.pull_request.number || github.event.inputs.issue_number }}" >> $GITHUB_ENV

      - name: Check Secrets in Code
        run: |
          echo "Scanning for hardcoded secrets..."
          if git diff HEAD~1..HEAD | grep -iE '(password|api[_-]?key|secret|token|private[_-]?key)\s*=\s*["\047]'; then
            echo "[FAIL] BLOCKED: Potential secrets detected in commit"
            echo "Detected patterns:"
            git diff HEAD~1..HEAD | grep -iE '(password|api[_-]?key|secret|token|private[_-]?key)\s*=\s*["\047]' || true
            exit 1
          fi
          echo "[PASS] No secrets detected"

      - name: Validate Commit Messages
        if: github.event_name == 'pull_request'
        run: |
          echo "Validating commit messages..."
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:"%s")

          # Check for issue reference
          if ! echo "$COMMITS" | grep -qE '#[0-9]+'; then
            echo "[FAIL] BLOCKED: No issue reference (#123) found in commit messages"
            echo "Commits must reference an issue number"
            exit 1
          fi

          # Check for conventional commit format
          if ! echo "$COMMITS" | grep -qE '^(feat|fix|docs|test|refactor|perf|chore):'; then
            echo "[WARN] WARNING: Commits should follow conventional commit format (feat:, fix:, etc.)"
          fi

          echo "[PASS] Commit message validation passed"

      - name: Check Documentation
        run: |
          echo "Checking documentation..."

          # Check for C# XML docs
          if find . -name "*.cs" -not -path "*/obj/*" -not -path "*/bin/*" | head -1 | grep -q "."; then
            UNDOCUMENTED=$(find . -name "*.cs" -not -path "*/obj/*" -not -path "*/bin/*" -exec grep -l "public " {} \; | \
              xargs grep -L "///" | wc -l)
            if [ "$UNDOCUMENTED" -gt 0 ]; then
              echo "[WARN] WARNING: $UNDOCUMENTED C# files with public APIs missing XML docs"
              echo "All public APIs should have XML documentation"
            fi
          fi

          # Check for README updates (if new feature)
          if [ "${{ github.event.pull_request.title }}" ]; then
            if echo "${{ github.event.pull_request.title }}" | grep -qi "feat:"; then
              if ! git diff origin/${{ github.base_ref }}..HEAD --name-only | grep -q "README.md"; then
                echo "[INFO] INFO: New feature added. Consider updating README.md"
              fi
            fi
          fi

          echo "[PASS] Documentation check complete"

      - name: Validate File Structure
        run: |
          echo "Validating file structure..."

          # Check for proper docs structure (canonical artifact paths)
          if [ -d "docs" ]; then
            for dir in docs/artifacts/prd docs/artifacts/adr docs/artifacts/specs docs/artifacts/reviews docs/ux; do
              if [ ! -d "$dir" ]; then
                echo "[WARN] WARNING: $dir/ directory not found"
              fi
            done
          fi

          echo "[PASS] File structure validation complete"

      - name: Harness Plan and Evidence Check
        shell: pwsh
        run: |
          ./scripts/check-harness-compliance.ps1 -BaseRef "${{ github.base_ref }}"

      - name: Token Budget Check
        run: |
          echo "Checking token budgets..."
          VIOLATIONS=0
          while IFS= read -r f; do
            CHARS=$(wc -c < "$f")
            TOKENS=$((CHARS / 4))
            LIMIT=5000
            if [ "$TOKENS" -gt "$LIMIT" ]; then
              echo "[FAIL] $f: $TOKENS tokens (limit: $LIMIT)"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find .github/skills -name 'SKILL.md' 2>/dev/null || true)

          while IFS= read -r f; do
            CHARS=$(wc -c < "$f")
            TOKENS=$((CHARS / 4))
            LIMIT=3000
            if [ "$TOKENS" -gt "$LIMIT" ]; then
              echo "[FAIL] $f: $TOKENS tokens (limit: $LIMIT)"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find .github/instructions -name '*.instructions.md' 2>/dev/null || true)

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "[FAIL] $VIOLATIONS file(s) exceed token budget"
            exit 1
          fi
          echo "[PASS] All files within token budget"

      - name: Skill Validation Pipeline
        run: |
          echo "Running skill validation pipeline..."
          FAIL=0
          for skill_dir in .github/skills/*/; do
            for sub_dir in "$skill_dir"*/; do
              if [ -f "$sub_dir/SKILL.md" ]; then
                SKILL_NAME=$(basename "$sub_dir")
                CONTENT=$(cat "$sub_dir/SKILL.md")

                # Check frontmatter exists
                if ! echo "$CONTENT" | head -1 | grep -q '^---'; then
                  echo "[FAIL] $SKILL_NAME: missing YAML frontmatter"
                  FAIL=$((FAIL + 1))
                  continue
                fi

                # Check name field
                if ! echo "$CONTENT" | grep -q 'name:'; then
                  echo "[FAIL] $SKILL_NAME: missing name field in frontmatter"
                  FAIL=$((FAIL + 1))
                fi

                # Check description field
                if ! echo "$CONTENT" | grep -q 'description:'; then
                  echo "[FAIL] $SKILL_NAME: missing description field in frontmatter"
                  FAIL=$((FAIL + 1))
                fi

                # Check token budget (5000 tokens ~ 20000 chars)
                CHARS=$(wc -c < "$sub_dir/SKILL.md")
                TOKENS=$((CHARS / 4))
                if [ "$TOKENS" -gt 5000 ]; then
                  echo "[FAIL] $SKILL_NAME: $TOKENS tokens (limit: 5000)"
                  FAIL=$((FAIL + 1))
                fi

                # Check directory name is kebab-case
                if ! echo "$SKILL_NAME" | grep -qE '^[a-z][a-z0-9-]*$'; then
                  echo "[FAIL] $SKILL_NAME: directory name not kebab-case"
                  FAIL=$((FAIL + 1))
                fi
              fi
            done
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "[FAIL] $FAIL skill validation error(s) found"
            exit 1
          fi
          echo "[PASS] All skills passed validation pipeline"

      - name: Reference Link Validation
        run: |
          echo "Validating cross-references in key docs..."
          BROKEN=0
          for doc in AGENTS.md Skills.md docs/WORKFLOW.md README.md; do
            if [ ! -f "$doc" ]; then continue; fi
            while IFS= read -r link; do
              TARGET=$(echo "$link" | grep -oP '(?<=\]\()[^)#]+' | head -1)
              if [ -z "$TARGET" ]; then continue; fi
              if echo "$TARGET" | grep -qE '^https?://|^mailto:'; then continue; fi
              DIR=$(dirname "$doc")
              RESOLVED="$DIR/$TARGET"
              if [ ! -e "$RESOLVED" ]; then
                echo "[FAIL] $doc: broken link -> $TARGET"
                BROKEN=$((BROKEN + 1))
              fi
            done < <(grep -oP '\[[^\]]+\]\([^)]+\)' "$doc" 2>/dev/null || true)
          done
          if [ "$BROKEN" -gt 0 ]; then
            echo "[WARN] $BROKEN broken link(s) found (advisory)"
          else
            echo "[PASS] All references valid"
          fi

      - name: Extension Lint and Test
        if: hashFiles('vscode-extension/package.json') != ''
        working-directory: vscode-extension
        run: |
          echo "Running extension test gate and lint advisory..."
          npm ci
          npm test
          npm run lint || echo "[WARN] Lint warnings/errors present (advisory mode)"
          echo "[PASS] Extension tests passed"

      - name: Agent Deliverable Validation
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Validating agent deliverables..."

          # Extract issue number from PR title or branch
          ISSUE_NUM=$(echo "${{ github.event.pull_request.title }}" | grep -oP '#\K\d+' | head -1)

          if [ -z "$ISSUE_NUM" ]; then
            # Try to get from branch name (e.g., feature/123-description)
            ISSUE_NUM=$(echo "${{ github.head_ref }}" | grep -oP '^\w+/\K\d+' | head -1)
          fi

          if [ -z "$ISSUE_NUM" ]; then
            echo "[INFO] No issue number found in PR title or branch, skipping agent validation"
            exit 0
          fi

          echo "Found issue #${ISSUE_NUM}"

          # Detect agent role from PR labels
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' 2>/dev/null || echo "")

          ROLE=""
          if echo "$LABELS" | grep -q "type:epic"; then
            ROLE="pm"
          elif echo "$LABELS" | grep -q "type:feature"; then
            ROLE="architect"
          elif echo "$LABELS" | grep -q "type:story"; then
            ROLE="engineer"
          elif echo "$LABELS" | grep -q "type:bug"; then
            ROLE="engineer"
          elif echo "$LABELS" | grep -q "type:devops"; then
            ROLE="devops"
          elif echo "$LABELS" | grep -q "needs:ux"; then
            ROLE="ux"
          fi

          # If no role from labels, try to detect from files changed
          if [ -z "$ROLE" ]; then
            FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}..HEAD)

            if echo "$FILES_CHANGED" | grep -q "docs/artifacts/prd/"; then
              ROLE="pm"
            elif echo "$FILES_CHANGED" | grep -q "docs/artifacts/adr/\|docs/artifacts/specs/"; then
              ROLE="architect"
            elif echo "$FILES_CHANGED" | grep -q "docs/ux/"; then
              ROLE="ux"
            elif echo "$FILES_CHANGED" | grep -q "docs/artifacts/reviews/"; then
              ROLE="reviewer"
            elif echo "$FILES_CHANGED" | grep -qE "\.(cs|py|ts|js|go|rs)$"; then
              ROLE="engineer"
            elif echo "$FILES_CHANGED" | grep -q ".github/workflows/"; then
              ROLE="devops"
            fi
          fi

          if [ -z "$ROLE" ]; then
            echo "[INFO] Could not determine agent role from labels or files"
            exit 0
          fi

          echo "Detected role: $ROLE"

          # Run validation script if it exists
          if [ -f ".github/scripts/validate-handoff.sh" ]; then
            chmod +x .github/scripts/validate-handoff.sh
            echo "Running validation for issue #${ISSUE_NUM} as ${ROLE}..."
            ./.github/scripts/validate-handoff.sh "$ISSUE_NUM" "$ROLE" || {
              echo "[WARN] Validation warnings detected (see above)"
              # Don't fail the job, just report
            }
          else
            echo "[WARN] validate-handoff.sh not found"
          fi

      - name: Post Quality Report
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '[PASS]' : '[FAIL]';
            const report = `
            ## Quality Gate Report

            | Check | Status |
            |-------|--------|
            | Secret Detection | ${status} |
            | Commit Message Format | ${status} |
            | Documentation | ${status} |
            | File Structure | ${status} |

            ${status === '[PASS]' ? '[PASS] All quality gates passed!' : '[FAIL] Quality gates failed. Please fix the issues above.'}

            ---
            *AgentX Quality Gates* | [View Workflow](../../.github/workflows/quality-gates.yml)
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
